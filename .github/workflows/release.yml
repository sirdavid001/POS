name: Build and publish QuickPOS releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        type: string
      release_notes:
        description: Short release notes for latest.json
        required: true
        type: string
      minimum_supported_version:
        description: Oldest supported app version
        required: true
        default: "1.0.0"
        type: string
      publish_windows:
        description: Build and publish Windows x64
        default: true
        type: boolean
      publish_android:
        description: Build and publish signed Android APK
        default: true
        type: boolean
      publish_macos:
        description: Build and publish signed/notarized macOS DMG
        default: false
        type: boolean
      publish_linux:
        description: Build and publish Linux AppImage and deb
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  windows:
    if: inputs.publish_windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build NSIS installer
        shell: bash
        env:
          VITE_APP_VERSION: ${{ inputs.version }}
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          npm run build -w packages/client
          npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.version="${{ inputs.version }}" --config.directories.output=release-ci
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release-ci/*.exe
            release-ci/*.blockmap
            release-ci/latest.yml

  android:
    if: inputs.publish_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - name: Restore signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/quickpos-release.jks
      - name: Build and verify signed release APK
        env:
          QUICKPOS_ANDROID_KEYSTORE: ../quickpos-release.jks
          QUICKPOS_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          QUICKPOS_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          QUICKPOS_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          QUICKPOS_VERSION_NAME: ${{ inputs.version }}
          QUICKPOS_VERSION_CODE: ${{ github.run_number }}
          VITE_APP_VERSION: ${{ inputs.version }}
        run: |
          npm run mobile:sync
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
          mkdir -p ../release-ci
          cp app/build/outputs/apk/release/app-release.apk "../release-ci/QuickPOS-${{ inputs.version }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: release-ci/*.apk

  macos:
    if: inputs.publish_macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build signed and notarized DMG
        env:
          VITE_APP_VERSION: ${{ inputs.version }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK"
          test -n "$APPLE_ID"
          npm run build -w packages/client
          npx electron-builder --mac dmg --publish never --config.extraMetadata.version="${{ inputs.version }}" --config.directories.output=release-ci
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release-ci/*.dmg

  linux:
    if: inputs.publish_linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Linux packages
        env:
          VITE_APP_VERSION: ${{ inputs.version }}
        run: |
          npm run build -w packages/client
          npx electron-builder --linux AppImage deb --x64 --publish never --config.extraMetadata.version="${{ inputs.version }}" --config.directories.output=release-ci
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release-ci/*.AppImage
            release-ci/*.deb

  publish:
    needs: [windows, android, macos, linux]
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Generate checksums and release manifest
        run: |
          node scripts/generate-release-manifest.mjs \
            --artifacts release-artifacts \
            --output publish/latest.json \
            --version "${{ inputs.version }}" \
            --minimum "${{ inputs.minimum_supported_version }}" \
            --notes "${{ inputs.release_notes }}"
      - name: Upload immutable release files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID"
          find release-artifacts -type f \( -name '*.exe' -o -name '*.apk' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.blockmap' \) -print0 |
            while IFS= read -r -d '' file; do
              aws s3 cp "$file" "s3://$R2_BUCKET/releases/${{ inputs.version }}/$(basename "$file")" --endpoint-url "$R2_ENDPOINT"
            done
          aws s3 cp publish/SHA256SUMS.txt "s3://$R2_BUCKET/releases/${{ inputs.version }}/SHA256SUMS.txt" --endpoint-url "$R2_ENDPOINT" --content-type text/plain
      - name: Publish Electron updater channel
        if: inputs.publish_windows
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp release-artifacts/windows/latest.yml "s3://$R2_BUCKET/desktop/windows/latest.yml" --endpoint-url "$R2_ENDPOINT" --content-type text/yaml --cache-control no-cache
          find release-artifacts/windows -maxdepth 1 -type f \( -name '*.exe' -o -name '*.blockmap' \) -print0 |
            while IFS= read -r -d '' file; do
              aws s3 cp "$file" "s3://$R2_BUCKET/desktop/windows/$(basename "$file")" --endpoint-url "$R2_ENDPOINT"
            done
      - name: Publish latest manifest last
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp publish/latest.json "s3://$R2_BUCKET/latest.json" --endpoint-url "$R2_ENDPOINT" --content-type application/json --cache-control no-cache
