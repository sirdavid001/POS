name: Deploy QuickPOS website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/website/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-website.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/website
      - name: Link Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEBSITE_PROJECT_ID }}
        run: |
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          mkdir -p packages/website/.vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > packages/website/.vercel/project.json
      - name: Build with Vercel production settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@50.28.0 pull --yes --environment=production --cwd packages/website --token="$VERCEL_TOKEN"
          npx vercel@50.28.0 build --prod --cwd packages/website --token="$VERCEL_TOKEN"
      - name: Deploy production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@50.28.0 deploy --prebuilt --prod --cwd packages/website --token="$VERCEL_TOKEN"
